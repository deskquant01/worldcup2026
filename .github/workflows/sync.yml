name: Sync World Cup Results

on:
  schedule:
    # Every 15 minutes during the tournament (Jun 11 – Jul 19 2026)
    # Free tier: 100 req/day — 15-min interval = 96 req/day, within limit
    - cron: '*/15 * * * *'
  workflow_dispatch:   # allow manual trigger from GitHub Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Sync results
        run: node sync-results.js
